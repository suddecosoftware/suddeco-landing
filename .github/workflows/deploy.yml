name: Deploy suddeco.com to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build frontend
        run: npx vite build
        env:
          VITE_APP_URL: https://suddeco.com
          VITE_MY_SUDDECO_URL: https://my.suddeco.com
          VITE_MARKETPLACE_URL: https://suddecohome.com
          VITE_SHOP_URL: https://materials.suddeco.com
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 0e46bc9b8134c7b4457391ebf4b17758
          projectName: suddeco-landing
          directory: dist/public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
