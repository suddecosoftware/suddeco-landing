name: Deploy suddeco.com to Cloudflare Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npx vite build
        env:
          VITE_APP_URL: https://suddeco.com
          VITE_MY_SUDDECO_URL: https://my.suddeco.com
          VITE_MARKETPLACE_URL: https://suddecohomes.com
          VITE_SHOP_URL: https://materials.suddeco.com

      - name: Deploy to Cloudflare Pages via Wrangler
        if: github.event_name != 'pull_request'
        run: npx wrangler pages deploy dist --project-name=suddeco-landing --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0e46bc9b8134c7b4457391ebf4b17758
