name: Deploy suddeco.com to Cloudflare Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npx vite build
        env:
          VITE_APP_URL: https://suddeco.com
          VITE_MY_SUDDECO_URL: https://my.suddeco.com
          VITE_MARKETPLACE_URL: https://suddecohomes.com
          VITE_SHOP_URL: https://materials.suddeco.com

      - name: Deploy to Cloudflare Pages via Wrangler
        if: github.event_name != 'pull_request'
        run: npx wrangler pages deploy dist --project-name=suddeco-landing --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0e46bc9b8134c7b4457391ebf4b17758
